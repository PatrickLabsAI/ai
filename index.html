<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DrinkSafe</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  background:#f5f4f0;
  font-family:'Inter', sans-serif;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 20px;
  background:white;
  border-bottom:1px solid #e8e5de;
  font-size:14px;
  color:#9aa0a6;
}

.globe{
  animation:spin 6s linear infinite;
}

@keyframes spin{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}

.container{
  max-width:460px;
  margin:auto;
  padding:40px 20px;
}

h1{
  font-family:'Syne';
  font-size:44px;
  line-height:1.05;
  color:#0B1F3B;
}

h1 span{
  color:#9aa0a6;
}

/* 🌊 폭포 애니메이션 */
.waterfall{
  margin-top:12px;
  font-size:28px;
  display:flex;
  gap:6px;
}

.drop{
  animation:fall 1.2s infinite;
}

.drop:nth-child(2){animation-delay:0.2s;}
.drop:nth-child(3){animation-delay:0.4s;}

@keyframes fall{
  0%{transform:translateY(0); opacity:0.4;}
  50%{transform:translateY(8px); opacity:1;}
  100%{transform:translateY(0); opacity:0.4;}
}

.card{
  margin-top:30px;
  background:white;
  border-radius:20px;
  padding:16px;
  border:1px solid #e8e5de;
}

.input-wrap{
  position:relative;
}

input{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:1px solid #e5e5e5;
  background:#f7f7f7;
  font-size:15px;
  box-sizing:border-box;
}

#suggestions{
  position:absolute;
  top:50px;
  left:0;
  right:0;
  background:white;
  border-radius:12px;
  border:1px solid #e5e5e5;
  overflow:hidden;
  z-index:10;
}

.sug{
  padding:12px;
  cursor:pointer;
}

.sug:hover{
  background:#f0f0f0;
}

button{
  width:100%;
  margin-top:10px;
  padding:14px;
  border-radius:12px;
  border:none;
  background:#0B1F3B;
  color:white;
  font-size:15px;
  cursor:pointer;
}

#result{
  margin-top:14px;
  font-size:15px;
  line-height:1.5;
}
</style>
</head>

<body onclick="hideSuggestions(event)">

<div class="topbar">
  <div>Patrick Labs AI</div>
  <div class="globe">🌍</div>
</div>

<div class="container">

<h1>
  Can I drink<br>
  <span>this water?</span>
</h1>

<!-- 🌊 애니메이션 폭포 -->
<div class="waterfall">
  <span class="drop">💧</span>
  <span class="drop">💧</span>
  <span class="drop">💧</span>
</div>

<div class="card">

<div class="input-wrap">
<input id="location"
 placeholder="Enter city or country"
 onfocus="showPopular()"
 oninput="showSuggestions()">
<div id="suggestions"></div>
</div>

<button onclick="checkWater()">Check water 💧</button>
<button onclick="useMyLocation()">Use my location 📍</button>

<div id="result"></div>

</div>

</div>

<script>

// 데이터
const data = {
"south korea":{status:"SAFE",msg:"Tap water is safe.",desc:"Highly regulated.",phone:"+822120"},
"france":{status:"SAFE",msg:"Safe to drink.",desc:"EU regulated.",phone:"+33140405050"},
"india":{status:"DANGER",msg:"Do not drink.",desc:"High contamination risk.",phone:"+911123792000"},
"kenya":{status:"WARNING",msg:"Boil water.",desc:"Varies by region.",phone:"+254202718707"}
};

// 도시
const cityMap = {
"seoul":"south korea",
"paris":"france",
"mumbai":"india",
"delhi":"india",
"nairobi":"kenya"
};

// 인기
const popular = ["Mumbai 🇮🇳","Delhi 🇮🇳","Paris 🇫🇷","Seoul 🇰🇷","Nairobi 🇰🇪"];

// 인기 표시
function showPopular(){
let box=document.getElementById("suggestions");
box.innerHTML="";
popular.forEach(c=>{
let div=document.createElement("div");
div.className="sug";
div.innerText=c;
div.onclick=()=>{
document.getElementById("location").value=c.split(" ")[0];
box.innerHTML="";
};
box.appendChild(div);
});
}

// 자동완성
function showSuggestions(){
let input=document.getElementById("location").value.toLowerCase();
let box=document.getElementById("suggestions");
box.innerHTML="";
for(let key in cityMap){
if(key.includes(input)){
let div=document.createElement("div");
div.className="sug";
div.innerText=key;
div.onclick=()=>{
document.getElementById("location").value=key;
box.innerHTML="";
};
box.appendChild(div);
}
}
}

// 👉 자동완성 닫기 핵심
function hideSuggestions(e){
const box = document.getElementById("suggestions");
const input = document.getElementById("location");

if(!input.contains(e.target)){
  box.innerHTML="";
}
}

// normalize
function normalize(i){
return i.toLowerCase().trim();
}

// 결과
function render(d, isLocation=false){
let color="#a05c00";
if(d.status==="SAFE") color="#1a7a4a";
if(d.status==="DANGER") color="#c0272d";

let extra = isLocation
? "<div style='margin-top:8px;'>📍 Within ~1km radius, tap water is generally assessed.</div>"
: "";

document.getElementById("result").innerHTML=
`<div style="color:${color};font-weight:600">${d.status}</div>
<div>${d.msg}</div>
<div style="font-size:13px;color:#666">${d.desc}</div>
${extra}
<div style="margin-top:8px;">
📞 <a href="tel:${d.phone}">Call local authority</a>
</div>`;
}

// 검색
function checkWater(){
document.getElementById("suggestions").innerHTML="";
let input=document.getElementById("location").value;
let country=cityMap[normalize(input)]||normalize(input);

if(data[country]){
render(data[country]);
}else{
document.getElementById("result").innerHTML="Checking...";
}
}

// GPS
function useMyLocation(){

document.getElementById("suggestions").innerHTML="";

navigator.geolocation.getCurrentPosition(async(pos)=>{

let res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`);
let loc = await res.json();

let city = loc.address.city || loc.address.town || loc.address.state;

document.getElementById("location").value = city;

let country = cityMap[normalize(city)] || normalize(city);

if(data[country]){
render(data[country], true);
}else{
document.getElementById("result").innerHTML="Checking...";
}

});
}

</script>

</body>
</html>
