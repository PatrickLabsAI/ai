<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DrinkSafe</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  background:#f5f4f0;
  font-family:'Inter', sans-serif;
}

/* 상단 */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 20px;
  background:white;
  border-bottom:1px solid #e8e5de;
  font-size:14px;
  color:#9aa0a6;
}

.globe{
  animation:spin 6s linear infinite;
}

@keyframes spin{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}

.container{
  max-width:460px;
  margin:auto;
  padding:36px 20px;
}

/* 제목 (축소) */
h1{
  font-family:'Syne';
  font-size:38px;
  line-height:1.1;
  color:#0B1F3B;
}

h1 span{
  color:#9aa0a6;
}

/* GIF */
.gif{
  margin-top:14px;
}

.gif iframe{
  width:100%;
  height:220px;
  border:none;
  border-radius:14px;
}

/* 카드 */
.card{
  margin-top:20px;
  background:white;
  border-radius:20px;
  padding:16px;
  border:1px solid #e8e5de;
}

.input-wrap{
  position:relative;
}

input{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:1px solid #e5e5e5;
  background:#f7f7f7;
  font-size:15px;
  box-sizing:border-box;
}

#suggestions{
  position:absolute;
  top:50px;
  left:0;
  right:0;
  background:white;
  border-radius:12px;
  border:1px solid #e5e5e5;
  overflow:hidden;
  z-index:10;
}

.sug{
  padding:12px;
  cursor:pointer;
}

.sug:hover{
  background:#f0f0f0;
}

button{
  width:100%;
  margin-top:10px;
  padding:14px;
  border-radius:12px;
  border:none;
  background:#0B1F3B;
  color:white;
  font-size:15px;
  cursor:pointer;
}

#result{
  margin-top:14px;
  font-size:15px;
}

/* ✨ 반짝 별 */
.sparkles{
  text-align:center;
  margin-top:20px;
  font-size:18px;
  animation:twinkle 1.5s infinite alternate;
}

@keyframes twinkle{
  from{opacity:0.5;}
  to{opacity:1;}
}

.subtitle{
  text-align:center;
  font-size:12px;
  color:#aaa;
  margin-top:6px;
}
</style>
</head>

<body onclick="hideSuggestions(event)">

<div class="topbar">
  <div>Patrick Labs AI</div>
  <div class="globe">🌍</div>
</div>

<div class="container">

<h1>
  Can I drink<br>
  <span>this water?</span>
</h1>

<!-- 🎬 GIF -->
<div class="gif">
<iframe src="https://giphy.com/embed/nfnF2zVPRemXu" allowFullScreen></iframe>
</div>

<!-- 🔍 카드 -->
<div class="card">

<div class="input-wrap">
<input id="location"
 placeholder="Enter city or country"
 onfocus="showPopular()"
 oninput="showSuggestions()">
<div id="suggestions"></div>
</div>

<button onclick="checkWater()">Check water 💧</button>
<button onclick="useMyLocation()">Use my location 📍</button>

<div id="result"></div>

</div>

<!-- ✨ 별 + WHO -->
<div class="sparkles">✨ ✨ ✨</div>
<div class="subtitle">
  Based on WHO, CDC, UNICEF & local authorities
</div>

</div>

<script>

let isLoading=false;

const data = {
"south korea":{status:"SAFE",msg:"Tap water is safe."},
"france":{status:"SAFE",msg:"Safe to drink."},
"india":{status:"DANGER",msg:"Do not drink tap water."},
"kenya":{status:"WARNING",msg:"Boil or filter water."}
};

const cityMap = {
"seoul":"south korea",
"paris":"france",
"mumbai":"india",
"delhi":"india",
"nairobi":"kenya"
};

const popular=["Mumbai 🇮🇳","Delhi 🇮🇳","Paris 🇫🇷","Seoul 🇰🇷","Nairobi 🇰🇪"];

function showPopular(){
let box=document.getElementById("suggestions");
box.innerHTML="";
popular.forEach(c=>{
let d=document.createElement("div");
d.className="sug";
d.innerText=c;
d.onclick=()=>{
location.value=c.split(" ")[0];
box.innerHTML="";
};
box.appendChild(d);
});
}

function showSuggestions(){
let input=location.value.toLowerCase();
let box=document.getElementById("suggestions");
box.innerHTML="";
for(let key in cityMap){
if(key.includes(input)){
let d=document.createElement("div");
d.className="sug";
d.innerText=key;
d.onclick=()=>{
location.value=key;
box.innerHTML="";
};
box.appendChild(d);
}
}
}

function hideSuggestions(e){
if(!location.contains(e.target)){
document.getElementById("suggestions").innerHTML="";
}
}

function normalize(i){
return i.toLowerCase().trim();
}

function render(d,isLoc=false){
isLoading=false;

let extra=isLoc?"<div>📍 Within ~1km radius tap water is generally assessed</div>":"";

result.innerHTML=`
<b>${d.status}</b><br>
${d.msg}
${extra}
`;
}

function checkWater(){
if(isLoading) return;
isLoading=true;

suggestions.innerHTML="";
result.innerHTML="💧 Checking...";

let c=cityMap[normalize(location.value)]||normalize(location.value);

setTimeout(()=>{
if(data[c]) render(data[c]);
else{
isLoading=false;
result.innerHTML="Checking...";
}
},800);
}

function useMyLocation(){
if(isLoading) return;
isLoading=true;

result.innerHTML="📡 Getting location...";
suggestions.innerHTML="";

navigator.geolocation.getCurrentPosition(async(pos)=>{

try{
let res=await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`);
let loc=await res.json();

let city=
loc.address.city||
loc.address.town||
loc.address.state||
loc.address.country;

location.value=city;

let c=cityMap[normalize(city)]||normalize(city);

if(data[c]) render(data[c],true);
else{
isLoading=false;
result.innerHTML="Checking...";
}

}catch{
isLoading=false;
result.innerHTML="❌ Location failed";
}

},()=>{
isLoading=false;
result.innerHTML="❌ Location permission denied";
});
}

</script>

</body>
</html>
