<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DrinkSafe — Patrick Labs AI</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600&family=Instrument+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
--bg:#f5f4f0;--border:#e8e5de;--text:#0f0f0f;--muted:#888;--navy:#0B1F3B;
--safe:#1a7a4a;--warn:#a05c00;--danger:#c0272d;
}
body{font-family:'Instrument Sans',sans-serif;background:var(--bg);}
.topbar{border-bottom:1px solid var(--border);padding:13px 20px;display:flex;justify-content:space-between;background:white;}
.topbar-brand{font-family:'Syne';font-size:12px;color:var(--muted);}
.globe-icon{animation:spin 6s linear infinite;}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.container{max-width:460px;margin:auto;padding:36px 20px;}
h1{font-family:'Syne';font-size:30px;color:var(--navy);}
.card{background:white;border-radius:20px;border:1px solid var(--border);margin-top:25px;}
.input-section{padding:18px;}
#location{width:100%;padding:14px;border-radius:12px;border:1px solid var(--border);}
#suggestions{background:white;border-radius:12px;border:1px solid var(--border);margin-top:5px;}
.sug-item{padding:10px;cursor:pointer;}
.sug-item:hover{background:#f0f0f0;}
.btn-check{width:90%;margin:10px auto;padding:14px;border-radius:12px;border:none;background:var(--navy);color:white;cursor:pointer;}
.btn-secondary{background:#0B1F3B;}
#result{margin:15px;}
.safe{color:var(--safe);} .warning{color:var(--warn);} .danger{color:var(--danger);}
</style>
</head>

<body>

<div class="topbar">
<span class="topbar-brand">Patrick Labs AI</span>
<div class="globe-icon">🌍</div>
</div>

<div class="container">
<h1>Can I drink this water?</h1>

<div class="card">
<div class="input-section">
<input id="location" placeholder="Enter city or country..." oninput="showSuggestions()"/>
<div id="suggestions"></div>
</div>

<button class="btn-check" onclick="checkWater()">Check Water</button>
<button class="btn-check btn-secondary" onclick="useMyLocation()">Use My Location 📍</button>

<div id="result"></div>
</div>
</div>

<script>

// 🌍 데이터 (확장됨)
const data = {
"seoul":{status:"SAFE",risk:"Advanced system 🇰🇷"},
"tokyo":{status:"SAFE",risk:"High quality 🇯🇵"},
"osaka":{status:"SAFE",risk:"Clean supply 🇯🇵"},
"bangkok":{status:"WARNING",risk:"Filtered recommended 🇹🇭"},
"singapore":{status:"SAFE",risk:"Top tier 🇸🇬"},
"new york":{status:"SAFE",risk:"EPA regulated 🇺🇸"},
"los angeles":{status:"SAFE",risk:"Safe 🇺🇸"},
"london":{status:"SAFE",risk:"Regulated 🇬🇧"},
"paris":{status:"SAFE",risk:"Safe 🇫🇷"},
"berlin":{status:"SAFE",risk:"Clean 🇩🇪"},
"rome":{status:"SAFE",risk:"Ancient aqueduct 🇮🇹"},
"madrid":{status:"SAFE",risk:"Safe 🇪🇸"},
"toronto":{status:"SAFE",risk:"Clean 🇨🇦"},
"sydney":{status:"SAFE",risk:"High quality 🇦🇺"},
"melbourne":{status:"SAFE",risk:"Clean 🇦🇺"},
"dubai":{status:"SAFE",risk:"Desalinated 🇦🇪"},
"delhi":{status:"DANGER",risk:"Contamination 🇮🇳"},
"mumbai":{status:"WARNING",risk:"Boil advised 🇮🇳"},
"jakarta":{status:"DANGER",risk:"Unsafe 🇮🇩"},
"bali":{status:"DANGER",risk:"Bacteria 🇮🇩"},
"manila":{status:"WARNING",risk:"Boil 🇵🇭"},
"cairo":{status:"WARNING",risk:"Mixed 🇪🇬"},
"lagos":{status:"DANGER",risk:"Unsafe 🇳🇬"},
"nairobi":{status:"WARNING",risk:"Filtered 🇰🇪"},
"rio":{status:"WARNING",risk:"Boil 🇧🇷"},
"mexico city":{status:"DANGER",risk:"Unsafe 🇲🇽"},

// 국가
"korea":{status:"SAFE",risk:"Modern 🇰🇷"},
"japan":{status:"SAFE",risk:"High quality 🇯🇵"},
"usa":{status:"SAFE",risk:"Regulated 🇺🇸"},
"uk":{status:"SAFE",risk:"Safe 🇬🇧"},
"france":{status:"SAFE",risk:"Safe 🇫🇷"},
"germany":{status:"SAFE",risk:"Clean 🇩🇪"},
"italy":{status:"SAFE",risk:"Safe 🇮🇹"},
"spain":{status:"SAFE",risk:"Safe 🇪🇸"},
"canada":{status:"SAFE",risk:"Clean 🇨🇦"},
"australia":{status:"SAFE",risk:"Clean 🇦🇺"},
"uae":{status:"SAFE",risk:"Desalinated 🇦🇪"},
"india":{status:"DANGER",risk:"Unsafe 🇮🇳"},
"indonesia":{status:"DANGER",risk:"Unsafe 🇮🇩"},
"philippines":{status:"WARNING",risk:"Boil 🇵🇭"},
"egypt":{status:"WARNING",risk:"Mixed 🇪🇬"},
"nigeria":{status:"DANGER",risk:"Unsafe 🇳🇬"},
"kenya":{status:"WARNING",risk:"Filtered 🇰🇪"},
"brazil":{status:"WARNING",risk:"Boil 🇧🇷"},
"mexico":{status:"DANGER",risk:"Unsafe 🇲🇽"}
};

// 자동완성
function showSuggestions(){
let input=document.getElementById("location").value.toLowerCase();
let box=document.getElementById("suggestions");
box.innerHTML="";
for(let key in data){
if(key.includes(input)){
let div=document.createElement("div");
div.className="sug-item";
div.innerText=key;
div.onclick=()=>{
document.getElementById("location").value=key;
box.innerHTML="";
}
box.appendChild(div);
}
}
}

// 결과
function checkWater(){
let val=document.getElementById("location").value.toLowerCase();
let result=document.getElementById("result");

if(!data[val]){
result.innerHTML="🔄 Water quality is being verified...";
return;
}

let d=data[val];
let cls="warning";
if(d.status==="SAFE")cls="safe";
if(d.status==="DANGER")cls="danger";

result.innerHTML=`<div class="${cls}"><strong>${d.status}</strong></div><div>${d.risk}</div>`;
}

// GPS
function useMyLocation(){
let result=document.getElementById("result");
result.innerHTML="📡 Getting location...";

navigator.geolocation.getCurrentPosition(async(pos)=>{
let lat=pos.coords.latitude;
let lon=pos.coords.longitude;

let res=await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
let loc=await res.json();

let city = loc.address.city || loc.address.town || loc.address.country;
document.getElementById("location").value=city.toLowerCase();

checkWater();
});
}

</script>

</body>
</html>
