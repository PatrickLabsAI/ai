<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DrinkSafe</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  background:#f5f4f0;
  font-family:'Inter', sans-serif;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 20px;
  background:white;
  border-bottom:1px solid #e8e5de;
  font-size:13px;
  color:#9aa0a6;
  font-family:'Space Grotesk', sans-serif;
}

.globe{
  animation:spin 6s linear infinite;
}

@keyframes spin{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}

.container{
  max-width:460px;
  margin:auto;
  padding:20px;
}

h1{
  font-family:'Syne';
  font-size:34px;
  line-height:1.1;
  color:#0B1F3B;
}

h1 span{
  color:#9aa0a6;
}

.tagline{
  margin-top:8px;
  font-size:13px;
  color:#7a7f87;
}

.gif iframe{
  width:100%;
  height:200px;
  border:none;
  border-radius:14px;
  margin-top:12px;
  pointer-events:none; /* 🔥 클릭 차단 */
}

.card{
  margin-top:18px;
  background:white;
  border-radius:20px;
  padding:16px;
  border:1px solid #e8e5de;
}

.input-wrap{
  position:relative;
}

input{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:1px solid #e5e5e5;
  background:#f7f7f7;
  font-size:15px;
  box-sizing:border-box;
}

#suggestions{
  position:absolute;
  top:50px;
  left:0;
  right:0;
  background:white;
  border-radius:12px;
  border:1px solid #e5e5e5;
  overflow:hidden;
  z-index:10;
}

.sug{
  padding:12px;
  cursor:pointer;
}

.sug:hover{
  background:#f0f0f0;
}

button{
  width:100%;
  margin-top:10px;
  padding:14px;
  border-radius:12px;
  border:none;
  background:#0B1F3B;
  color:white;
  font-size:15px;
  cursor:pointer;
}

.share{
  background:#e9ecf1;
  color:#0B1F3B;
}

#result{
  margin-top:14px;
  font-size:15px;
  line-height:1.5;
}
</style>
</head>

<body onclick="hideSuggestions(event)">

<div class="topbar">
  <div>Patrick Labs AI</div>
  <div class="globe">🌍</div>
</div>

<div class="container">

<h1>
  Can I drink<br>
  <span>this water?</span>
</h1>

<div class="tagline">
⚡️ AI-powered water safety intelligence platform<br>
⚡️ Based on WHO, CDC, UNICEF & global data
</div>

<div class="gif">
<iframe src="https://giphy.com/embed/nfnF2zVPRemXu"></iframe>
</div>

<div class="card">

<div class="input-wrap">
<input id="locationInput"
 placeholder="Enter city or country"
 onfocus="showPopular()"
 oninput="showSuggestions()">
<div id="suggestions"></div>
</div>

<button onclick="checkWater()">Check water 💧</button>
<button onclick="useMyLocation()">Use my location 📍</button>

<div id="result"></div>

<button class="share" onclick="shareResult()">Share this result 🔗</button>

</div>

</div>

<script>

let isLoading=false;
let lastResult="";

const input = document.getElementById("locationInput");
const result = document.getElementById("result");
const suggestions = document.getElementById("suggestions");

const data = {
"south korea":{status:"SAFE",phone:"1339"},
"france":{status:"SAFE",phone:"15"},
"india":{status:"DANGER",phone:"102"},
"kenya":{status:"WARNING",phone:"+254 20 2717077"},
"united states":{status:"SAFE",phone:"1-800-426-4791"}
};

const cityMap = {
"seoul":"south korea",
"paris":"france",
"mumbai":"india",
"delhi":"india",
"nairobi":"kenya",
"new york":"united states"
};

const popular=["Mumbai 🇮🇳","Delhi 🇮🇳","Paris 🇫🇷","Seoul 🇰🇷","Nairobi 🇰🇪"];

function showPopular(){
suggestions.innerHTML="";
popular.forEach(c=>{
let d=document.createElement("div");
d.className="sug";
d.innerText=c;
d.onclick=()=>{
input.value=c.split(" ")[0];
suggestions.innerHTML="";
};
suggestions.appendChild(d);
});
}

function showSuggestions(){
let val=input.value.toLowerCase();
suggestions.innerHTML="";
for(let key in cityMap){
if(key.includes(val)){
let d=document.createElement("div");
d.className="sug";
d.innerText=key;
d.onclick=()=>{
input.value=key;
suggestions.innerHTML="";
};
suggestions.appendChild(d);
}
}
}

function hideSuggestions(e){
if(!input.contains(e.target)){
suggestions.innerHTML="";
}
}

function normalize(v){
return v.toLowerCase().trim();
}

function render(obj,locationName,isLoc=false){
isLoading=false;

let explanation =
obj.status==="SAFE"
? "Water is treated and monitored with modern purification systems. Generally safe for drinking without boiling."
: obj.status==="DANGER"
? "Water may contain bacteria or contaminants. Avoid drinking tap water. Use bottled or filtered water."
: "Water quality varies. Boiling or filtering is strongly recommended before drinking.";

let extra = isLoc ? "<div>📍 Within ~1km radius, infrastructure suggests similar water conditions</div>" : "";

lastResult = `${locationName}: ${obj.status}`;

result.innerHTML=`
<b>${obj.status}</b><br>
${explanation}<br><br>
📞 <a href="tel:${obj.phone}">Call local water authority</a>
${extra}
`;
}

function checkWater(){
if(isLoading) return;
isLoading=true;

suggestions.innerHTML="";
result.innerHTML="💧 Checking...";

let val=normalize(input.value);
let country=cityMap[val]||val;

setTimeout(()=>{
let obj=data[country] || {status:"WARNING",phone:""};
render(obj,input.value);
},700);
}

function useMyLocation(){
if(isLoading) return;
isLoading=true;

result.innerHTML="📡 Getting location...";
suggestions.innerHTML="";

navigator.geolocation.getCurrentPosition(async(pos)=>{

try{
let res=await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`);
let loc=await res.json();

let city =
loc.address.city ||
loc.address.town ||
loc.address.state ||
loc.address.country;

input.value = city;

let val=normalize(city);
let country=cityMap[val]||val;

let obj=data[country] || {status:"WARNING",phone:""};

render(obj,city,true);

}catch{
isLoading=false;
result.innerHTML="❌ Location failed";
}

},()=>{
isLoading=false;
result.innerHTML="❌ Location permission denied";
});
}

function shareResult(){
if(!lastResult){
alert("Check water first!");
return;
}

if(navigator.share){
navigator.share({
title:"Water Safety",
text:lastResult,
url:window.location.href
});
}else{
navigator.clipboard.writeText(lastResult);
alert("Copied to clipboard!");
}
}

</script>

</body>
</html>
