<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DrinkSafe — Patrick Labs AI</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=Instrument+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f5f4f0;
  --surface: #ffffff;
  --border: #e8e5de;
  --text: #0f0f0f;
  --muted: #888;
  --navy: #0B1F3B;
  --safe:#1a7a4a;
  --warn:#a05c00;
  --danger:#c0272d;
}

body {
  font-family: 'Instrument Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
}

.topbar {
  border-bottom: 1px solid var(--border);
  padding: 13px 20px;
  display: flex;
  justify-content: space-between;
  background: white;
}

.topbar-brand {
  font-family: 'Syne';
  font-size: 12px;
  letter-spacing: 0.1em;
  color: var(--muted);
}

.globe-icon {
  font-size: 16px;
  animation: spin 6s linear infinite;
}

@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.container {
  max-width: 460px;
  margin: auto;
  padding: 36px 20px;
}

.header-eyebrow {
  font-size: 11px;
  letter-spacing: 0.1em;
  color: var(--muted);
}

h1 {
  font-family: 'Syne';
  font-size: 30px;
  color: var(--navy);
  margin: 10px 0;
}

h1 span { opacity: 0.4; }

.data-source {
  font-size: 12px;
  color: var(--muted);
}

.card {
  background: white;
  border-radius: 20px;
  border: 1px solid var(--border);
  margin-top: 25px;
}

.input-section {
  padding: 18px;
  position: relative;
}

.input-wrap { position: relative; }

.input-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
}

#location {
  width: 100%;
  padding: 14px 14px 14px 36px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: var(--bg);
}

/* 자동완성 */
#suggestions {
  position: absolute;
  width: 100%;
  background: white;
  border-radius: 12px;
  border: 1px solid var(--border);
  margin-top: 5px;
  z-index: 10;
}

.sug-item {
  padding: 10px;
  cursor: pointer;
}

.sug-item:hover {
  background: #f0f0f0;
}

/* 버튼 */
.btn-check {
  width: calc(100% - 36px);
  margin: 0 18px 10px;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: var(--navy);
  color: white;
  font-weight: 600;
  cursor: pointer;

  /* 🔥 애니메이션 */
  transition: all 0.15s ease;
}

/* 눌리는 효과 */
.btn-check:active {
  transform: scale(0.97);
}

/* hover 효과 */
.btn-check:hover {
  opacity: 0.9;
}

.btn-secondary {
  background: var(--navy);
  opacity: 0.7;
}

#result {
  margin: 0 18px 18px;
  font-size: 15px;
  line-height: 1.6;

  /* 결과 등장 애니메이션 */
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(5px); }
  to { opacity: 1; transform: translateY(0); }
}

.safe { color: var(--safe); }
.warning { color: var(--warn); }
.danger { color: var(--danger); }

.footer {
  text-align: center;
  font-size: 11px;
  color: #aaa;
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="topbar">
  <span class="topbar-brand">Patrick Labs AI</span>
  <div class="globe-icon">🌍</div>
</div>

<div class="container">

<div>
  <div class="header-eyebrow">Water Safety</div>
  <h1>Can I drink<br><span>this water?</span></h1>
  <div class="data-source">Based on WHO, CDC, UNICEF & local authorities</div>
</div>

<div class="card">
  <div class="input-section">
    <div class="input-wrap">
      <span class="input-icon">🔍</span>
      <input id="location" placeholder="Enter city or country..." oninput="showSuggestions()" />
      <div id="suggestions"></div>
    </div>
  </div>

  <button class="btn-check" onclick="checkWater()">Check Water 💧</button>
  <button class="btn-check btn-secondary" onclick="useMyLocation()">Use My Location 📍</button>

  <div id="result"></div>
</div>

<div class="footer">
Data is for guidance only. Always verify locally.
</div>

</div>

<script>

// 데이터 일부 (유지)
const data = {
"seoul":{status:"SAFE",risk:"Advanced purification 🇰🇷"},
"tokyo":{status:"SAFE",risk:"Strict standards 🇯🇵"},
"new york":{status:"SAFE",risk:"EPA regulated 🇺🇸"},
"london":{status:"SAFE",risk:"Regulated 🇬🇧"},
"delhi":{status:"DANGER",risk:"Contamination 🇮🇳"},
"bangkok":{status:"WARNING",risk:"Filtered 🇹🇭"}
};

function normalizeLocation(name){
name = name.toLowerCase();
if(name.includes("서울")) return "seoul";
return name;
}

function showSuggestions(){
let input=document.getElementById("location").value.toLowerCase();
let box=document.getElementById("suggestions");
box.innerHTML="";
for(let key in data){
if(key.includes(input)){
let div=document.createElement("div");
div.className="sug-item";
div.innerText=key;
div.onclick=()=>{
document.getElementById("location").value=key;
box.innerHTML="";
}
box.appendChild(div);
}
}
}

function checkWater(){
let raw=document.getElementById("location").value;
let val=normalizeLocation(raw);
let result=document.getElementById("result");

if(data[val]){
render(data[val]);
return;
}

result.innerHTML="🔄 Water quality is being verified...";
}

function render(d){
let cls="warning";
if(d.status==="SAFE")cls="safe";
if(d.status==="DANGER")cls="danger";

document.getElementById("result").innerHTML=
`<div class="${cls}"><strong>${d.status}</strong></div><div>${d.risk}</div>`;
}

function useMyLocation(){
let result=document.getElementById("result");
result.innerHTML="📡 Getting location...";

navigator.geolocation.getCurrentPosition(async(pos)=>{
let lat=pos.coords.latitude;
let lon=pos.coords.longitude;

let res=await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
let loc=await res.json();

let city=loc.address.city || loc.address.state || loc.address.country;
document.getElementById("location").value=city;

checkWater();
});
}

</script>

</body>
</html>
