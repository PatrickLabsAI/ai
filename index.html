<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DrinkSafe</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=Inter:wght@300;400;500;600&family=Quicksand:wght@400;600&family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  background:#f5f4f0;
  font-family:'Inter', sans-serif;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 20px;
  background:white;
  border-bottom:1px solid #e8e5de;
  font-size:13px;
  color:#9aa0a6;
  font-family:'Space Grotesk';
}

.globe{
  animation:spin 6s linear infinite;
}

@keyframes spin{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}

.container{
  max-width:460px;
  margin:auto;
  padding:18px;
}

h1{
  font-family:'Syne';
  font-size:34px;
  margin-top:5px;
  color:#0B1F3B;
}

h1 span{
  color:#9aa0a6;
}

/* 🔥 문구 위로 */
.tagline{
  margin-top:2px;
  font-size:13px;
  color:#7a7f87;
}

.tagline span{
  animation:flash 1s infinite alternate;
}

@keyframes flash{
  from{opacity:0.4;}
  to{opacity:1;}
}

.gif iframe{
  width:100%;
  height:200px;
  border:none;
  border-radius:14px;
  margin-top:10px;
  pointer-events:none;
}

.card{
  margin-top:18px;
  background:white;
  border-radius:20px;
  padding:16px;
  border:1px solid #e8e5de;
}

.input-wrap{
  position:relative;
}

input{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:1px solid #e5e5e5;
  background:#f7f7f7;
  font-size:15px;
  box-sizing:border-box;
}

#suggestions{
  position:absolute;
  top:50px;
  left:0;
  right:0;
  background:white;
  border-radius:12px;
  border:1px solid #e5e5e5;
  overflow:hidden;
  z-index:10;
}

.sug{
  padding:12px;
  cursor:pointer;
}

.sug:hover{
  background:#f0f0f0;
}

button{
  width:100%;
  margin-top:10px;
  padding:14px;
  border-radius:12px;
  border:none;
  background:#0B1F3B;
  color:white;
  font-size:15px;
  cursor:pointer;
}

.share{
  background:#e9ecf1;
  color:#0B1F3B;
}

#result{
  margin-top:14px;
  font-family:'Quicksand';
  font-size:16px;
  line-height:1.6;
}
</style>
</head>

<body onclick="hideSuggestions(event)">

<div class="topbar">
  <div>Patrick Labs AI</div>
  <div class="globe">🌍</div>
</div>

<div class="container">

<h1>
  Can I drink<br>
  <span>this water?</span>
</h1>

<div class="tagline">
<span>⚡️</span> AI-powered water safety cloud<br>
<span>⚡️</span> Based on WHO, CDC & UNICEF
</div>

<div class="gif">
<iframe src="https://giphy.com/embed/nfnF2zVPRemXu"></iframe>
</div>

<div class="card">

<div class="input-wrap">
<input id="locationInput"
 placeholder="Enter city or country"
 onfocus="showPopular()"
 oninput="showSuggestions()">
<div id="suggestions"></div>
</div>

<button onclick="checkWater()">Check water 💧</button>
<button onclick="useMyLocation()">Use my location 📍</button>

<div id="result"></div>

<button class="share" onclick="shareResult()">Share 🔗</button>

</div>

</div>

<script>

const input = document.getElementById("locationInput");
const result = document.getElementById("result");
const suggestions = document.getElementById("suggestions");

let lastResult="";

/* 🔥 데이터 */
const data = {
"south korea":{status:"SAFE",phone:"1339"},
"france":{status:"SAFE",phone:"15"},
"india":{status:"DANGER",phone:"102"},
"kenya":{status:"WARNING",phone:"+254207177000"},
"united states":{status:"SAFE",phone:"18004264791"}
};

/* 🔥 도시/언어 매핑 강화 */
const cityMap = {
"seoul":"south korea",
"서울":"south korea",
"서울특별시":"south korea",
"paris":"france",
"mumbai":"india",
"delhi":"india",
"nairobi":"kenya",
"new york":"united states"
};

const popular=["Mumbai 🇮🇳","Delhi 🇮🇳","Paris 🇫🇷","Seoul 🇰🇷","Nairobi 🇰🇪"];

/* 인기 */
function showPopular(){
suggestions.innerHTML="";
popular.forEach(c=>{
let d=document.createElement("div");
d.className="sug";
d.innerText=c;
d.onclick=()=>{
input.value=c.split(" ")[0];
suggestions.innerHTML="";
};
suggestions.appendChild(d);
});
}

/* 자동완성 */
function showSuggestions(){
let val=input.value.toLowerCase();
suggestions.innerHTML="";

if(!val){ showPopular(); return; }

for(let key in cityMap){
if(key.includes(val)){
let d=document.createElement("div");
d.className="sug";
d.innerText=key;
d.onclick=()=>{
input.value=key;
suggestions.innerHTML="";
};
suggestions.appendChild(d);
}
}
}

/* 닫기 */
function hideSuggestions(e){
if(!input.contains(e.target)){
suggestions.innerHTML="";
}
}

function normalize(v){
return v.toLowerCase().trim();
}

function getCountry(val){
return cityMap[val] || val;
}

/* 결과 */
function render(obj,name,isLoc=false){

let explanation =
obj.status==="SAFE"
? "✅ Clean, treated water with strong infrastructure. Safe for daily consumption."
: obj.status==="DANGER"
? "🚫 High contamination risk. Avoid tap water."
: "⚠️ Water quality varies. Boil or filter before drinking.";

let extra = isLoc ? "<div>📍 Within ~1km radius, similar conditions apply</div>" : "";

lastResult = `${name}: ${obj.status}`;

result.innerHTML=`
<b>${obj.status}</b><br>
${explanation}<br><br>
📞 <a href="tel:${obj.phone}">Call water authority</a>
${extra}
`;
}

/* 체크 */
function checkWater(){
let val=normalize(input.value);
if(!val){
result.innerHTML="❗ Enter a location";
return;
}

let country=getCountry(val);
let obj=data[country] || {status:"WARNING",phone:""};

render(obj,input.value);
}

/* GPS */
function useMyLocation(){

result.innerHTML="📡 Getting location...";
suggestions.innerHTML="";

navigator.geolocation.getCurrentPosition(async(pos)=>{

try{
let res=await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`);
let loc=await res.json();

let city =
loc.address.city ||
loc.address.town ||
loc.address.state ||
loc.address.country;

input.value = city;

let val=normalize(city);
let country=getCountry(val);

let obj=data[country] || {status:"WARNING",phone:""};

render(obj,city,true);

}catch{
result.innerHTML="❌ Location failed";
}

},()=>{
result.innerHTML="❌ Permission denied";
});
}

/* 공유 */
function shareResult(){
if(!lastResult){
alert("Check water first!");
return;
}

if(navigator.share){
navigator.share({
title:"Water Safety",
text:lastResult,
url:window.location.href
});
}else{
navigator.clipboard.writeText(lastResult);
alert("Copied!");
}
}

</script>

</body>
</html>
