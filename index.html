<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DrinkSafe</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=Inter:wght@300;400;500;600&family=Quicksand:wght@400;600&family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet">

<style>
body{margin:0;background:#f5f4f0;font-family:'Inter';}

.topbar{
display:flex;
justify-content:space-between;
padding:14px 20px;
background:white;
border-bottom:1px solid #e8e5de;
font-size:13px;
color:#9aa0a6;
font-family:'Space Grotesk';
}

.globe{
animation:spin 6s linear infinite;
}

@keyframes spin{
from{transform:rotate(0);}
to{transform:rotate(360deg);}
}

.container{
max-width:460px;
margin:auto;
padding:18px;
}

h1{
font-family:'Syne';
font-size:30px;
color:#0B1F3B;
margin:0;
}

h1 span{
color:#9aa0a6;
}

.tagline{
font-size:13px;
margin-top:-4px;
color:#7a7f87;
}

.tagline span{
animation:flash 1s infinite alternate;
}

@keyframes flash{
from{opacity:0.4;}
to{opacity:1;}
}

.gif iframe{
width:100%;
height:200px;
border:none;
border-radius:14px;
margin-top:10px;
pointer-events:none;
}

.card{
margin-top:16px;
background:white;
border-radius:20px;
padding:16px;
border:1px solid #e8e5de;
text-align:center;
}

button{
width:100%;
margin-top:12px;
padding:16px;
border-radius:14px;
border:none;
background:#0B1F3B;
color:white;
font-size:16px;
}

.share{
background:#e9ecf1;
color:#0B1F3B;
}

#result{
margin-top:16px;
font-family:'Quicksand';
font-size:16px;
}
</style>
</head>

<body>

<div class="topbar">
<div>Patrick Labs AI</div>
<div class="globe">🌍</div>
</div>

<div class="container">

<h1>
Can I drink<br>
<span>this water?</span>
</h1>

<div class="tagline">
<span>⚡️</span> AI-powered live water cloud<br>
<span>⚡️</span> Based on WHO, CDC & UNICEF
</div>

<div class="gif">
<iframe src="https://giphy.com/embed/nfnF2zVPRemXu"></iframe>
</div>

<div class="card">

<button onclick="useMyLocation()">
📍 Check water near me
</button>

<div id="result"></div>

<button class="share" onclick="shareResult()">
Share 🔗
</button>

</div>

</div>

<script>

const result = document.getElementById("result");
let lastResult = "";

/* 🌍 데이터 */
const data={
"south korea":{status:"SAFE",phone:"+821339"},
"japan":{status:"SAFE",phone:"+81119"},
"france":{status:"SAFE",phone:"+3315"},
"united states":{status:"SAFE",phone:"+18004264791"},
"india":{status:"DANGER",phone:"+91104"},
"vietnam":{status:"WARNING",phone:"+84908115678"},
"kenya":{status:"WARNING",phone:"+254202717077"},
"nigeria":{status:"DANGER",phone:"+2347000000000"},
"south africa":{status:"WARNING",phone:"+27123000000"},
"global":{status:"WARNING",phone:""}
};

function render(obj,place){

let explanation =
obj.status==="SAFE"
? "✅ Tap water is safe to drink in this area."
: obj.status==="DANGER"
? "🚫 Unsafe water. Avoid drinking completely."
: "⚠️ Boil or filter water before drinking.";

lastResult = place + " - " + obj.status;

result.innerHTML = `
<b>${place}</b><br><br>
<b>${obj.status}</b><br>
${explanation}<br><br>
${obj.phone ? `📞 <a href="tel:${obj.phone}">Call water authority</a>` : ""}
`;
}

function useMyLocation(){

result.innerHTML="📡 Detecting location...";

navigator.geolocation.getCurrentPosition(async(pos)=>{

let res = await fetch(
`https://nominatim.openstreetmap.org/reverse?format=json&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`
);

let loc = await res.json();

let country = loc.address.country?.toLowerCase() || "global";
let city =
loc.address.city ||
loc.address.town ||
loc.address.state ||
loc.address.country;

if(!data[country]) country="global";

render(data[country], city);

},()=>{
result.innerHTML="❌ Location permission denied";
});
}

function shareResult(){
if(!lastResult){
alert("Check water first!");
return;
}

navigator.share
? navigator.share({text:lastResult})
: (navigator.clipboard.writeText(lastResult), alert("Copied!"));
}

</script>

</body>
</html>
