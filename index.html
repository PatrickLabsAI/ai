<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DrinkSafe</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=Inter:wght@300;400;500;600&family=Quicksand:wght@400;600&family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet">

<style>
body{margin:0;background:#f5f4f0;font-family:'Inter';}

.topbar{
display:flex;justify-content:space-between;
padding:14px 20px;background:white;
border-bottom:1px solid #e8e5de;
font-size:13px;color:#9aa0a6;
font-family:'Space Grotesk';
}

.globe{animation:spin 6s linear infinite;}
@keyframes spin{from{transform:rotate(0);}to{transform:rotate(360deg);}}

.container{max-width:460px;margin:auto;padding:18px;}

h1{font-family:'Syne';font-size:28px;color:#0B1F3B;margin:0;}
h1 span{color:#9aa0a6;}

.tagline{font-size:13px;margin-top:12px;color:#7a7f87;}

.gif iframe{
width:100%;height:200px;border:none;border-radius:14px;margin-top:10px;pointer-events:none;
}

.card{
margin-top:16px;background:white;border-radius:20px;padding:16px;
border:1px solid #e8e5de;text-align:center;
}

button{
width:100%;margin-top:12px;padding:16px;border-radius:14px;
border:none;background:#0B1F3B;color:white;font-size:16px;
}

#result{
margin-top:16px;font-family:'Quicksand';font-size:16px;
}

/* 📊 차트 스타일 */
.chart{
margin-top:18px;
text-align:left;
}

.chart h3{
font-size:14px;
margin-bottom:8px;
}

.row{
margin-bottom:10px;
}

.label{
display:flex;
justify-content:space-between;
font-size:13px;
margin-bottom:4px;
}

.bar{
height:10px;
background:#eee;
border-radius:6px;
overflow:hidden;
}

.fill{
height:100%;
background:#0B1F3B;
border-radius:6px;
transition:width 0.6s ease;
}

.live{
font-size:11px;
background:#ff4d4d;
color:white;
padding:3px 6px;
border-radius:6px;
margin-left:6px;
}
</style>
</head>

<body>

<div class="topbar">
<div>Patrick Labs AI</div>
<div class="globe">🌍</div>
</div>

<div class="container">

<h1>Can I drink<br><span>this water?</span></h1>

<div class="tagline">
⚡️ AI-powered live water cloud<br>
⚡️ Based on WHO, CDC & UNICEF
</div>

<div class="gif">
<iframe src="https://giphy.com/embed/nfnF2zVPRemXu"></iframe>
</div>

<div class="card">

<button onclick="useMyLocation()">📍 Check water near me</button>

<div id="result"></div>

<!-- 📊 차트 -->
<div id="chart" class="chart">

<h3>Global Water Status <span class="live">LIVE</span></h3>

<!-- SAFE -->
<div class="row">
<div class="label">🇯🇵 Tokyo <span>90%</span></div>
<div class="bar"><div class="fill" style="width:90%"></div></div>
</div>

<div class="row">
<div class="label">🇰🇷 Seoul <span>88%</span></div>
<div class="bar"><div class="fill" style="width:88%"></div></div>
</div>

<div class="row">
<div class="label">🇨🇭 Zurich <span>92%</span></div>
<div class="bar"><div class="fill" style="width:92%"></div></div>
</div>

<!-- WARNING -->
<div class="row">
<div class="label">🇹🇭 Bangkok <span>60%</span></div>
<div class="bar"><div class="fill" style="width:60%"></div></div>
</div>

<div class="row">
<div class="label">🇰🇪 Nairobi <span>55%</span></div>
<div class="bar"><div class="fill" style="width:55%"></div></div>
</div>

<!-- DANGER -->
<div class="row">
<div class="label">🇮🇳 India <span>30%</span></div>
<div class="bar"><div class="fill" style="width:30%"></div></div>
</div>

<div class="row">
<div class="label">🇳🇬 Nigeria <span>25%</span></div>
<div class="bar"><div class="fill" style="width:25%"></div></div>
</div>

</div>

</div>
</div>

<script>

const result = document.getElementById("result");
const chart = document.getElementById("chart");

let isLoading = false;
let lastResult = "";

/* 🌍 데이터 */
const data={
"south korea":{status:"SAFE",phone:"+821339"},
"japan":{status:"SAFE",phone:"+81119"},
"france":{status:"SAFE",phone:"+3315"},
"united states":{status:"SAFE",phone:"+18004264791"},
"india":{status:"DANGER",phone:"+91104"},
"vietnam":{status:"WARNING",phone:"+84908115678"},
"kenya":{status:"WARNING",phone:"+254202717077"},
"nigeria":{status:"DANGER",phone:"+2347000000000"},
"global":{status:"WARNING",phone:""}
};

function normalizeCountry(name){
name=name.toLowerCase();

if(name.includes("korea")) return "south korea";
if(name.includes("japan")) return "japan";
if(name.includes("india")) return "india";
if(name.includes("vietnam")) return "vietnam";
if(name.includes("kenya")) return "kenya";
if(name.includes("nigeria")) return "nigeria";

return name;
}

function render(obj,place){

chart.style.order = "2"; // 🔥 차트 아래로 이동

let explanation =
obj.status==="SAFE"
? "✅ Safe tap water. No boiling needed."
: obj.status==="DANGER"
? "🚫 Unsafe water. Do NOT drink."
: "⚠️ Boil or filter before drinking.";

lastResult = place + " - " + obj.status;

result.innerHTML = `
<b>${place}</b><br><br>
<b>${obj.status}</b><br>
${explanation}<br><br>

📌 Local pipe conditions may vary.<br><br>

${obj.phone ? `📞 <a href="tel:${obj.phone}">Call water authority</a><br><br>` : ""}

<button onclick="shareResult()">Share 🔗</button>
`;
}

function useMyLocation(){

if(isLoading) return; // 🔥 중복 클릭 방지

isLoading = true;

result.innerHTML="📡 Checking water quality...";

navigator.geolocation.getCurrentPosition(async(pos)=>{

try{

let res = await fetch(
`https://nominatim.openstreetmap.org/reverse?format=json&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`
);

let loc = await res.json();

let countryRaw = loc.address.country || "global";
let country = normalizeCountry(countryRaw);

let place =
loc.address.city ||
loc.address.town ||
loc.address.state ||
countryRaw;

if(!data[country]) country="global";

render(data[country], place);

}catch(e){
result.innerHTML="❌ Failed to load data";
}

isLoading = false;

},()=>{
result.innerHTML="❌ Location permission denied";
isLoading = false;
});
}

function shareResult(){
navigator.share
? navigator.share({text:lastResult})
: (navigator.clipboard.writeText(lastResult), alert("Copied!"));
}

</script>

</body>
</html>
