<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Water Safety — Patrick Labs AI</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<meta property="og:title" content="Can I drink this water?" />
<meta property="og:description" content="Check water safety instantly worldwide." />
<meta property="og:image" content="https://cdn-icons-png.flaticon.com/512/728/728093.png" />
<meta property="og:url" content="https://ai-zeta-lake.vercel.app/" />
<meta name="twitter:card" content="summary_large_image" />

<style>
:root {
  --bg: #f5f4f0;
  --border: #e8e5de;
  --text: #0f0f0f;
  --muted: #888;
  --navy: #0B1F3B;

  --safe:#1a7a4a;
  --warn:#a05c00;
  --danger:#c0272d;
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  margin: 0;
  color: var(--text);
}

.topbar {
  border-bottom: 1px solid var(--border);
  padding: 13px 20px;
  display: flex;
  justify-content: space-between;
  background: white;
}

.topbar-brand {
  font-family: 'Syne';
  font-size: 12px;
  letter-spacing: 0.1em;
  color: var(--muted);
}

.globe-icon {
  animation: spin 6s linear infinite;
}
@keyframes spin {
  from { transform: rotate(0); }
  to { transform: rotate(360deg); }
}

.container {
  max-width: 460px;
  margin: auto;
  padding: 36px 20px;
}

h1 {
  font-family: 'Syne';
  font-size: 30px;
  color: var(--navy);
}

.data-source {
  font-size: 12px;
  color: var(--muted);
  margin-top: 6px;
}

.card {
  background: white;
  border-radius: 20px;
  border: 1px solid var(--border);
  margin-top: 25px;
}

.input-section {
  padding: 18px;
  position: relative;
}

#location {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: #fafafa;
  font-size: 15px;
  font-weight: 500;
}

#location::placeholder {
  color: #bbb;
}

#suggestions {
  position: absolute;
  width: 100%;
  background: white;
  border-radius: 12px;
  border: 1px solid var(--border);
  margin-top: 5px;
  z-index: 10;
}

.sug-item {
  padding: 12px;
  font-size: 14px;
  display: flex;
  justify-content: space-between;
}

.sug-item:hover {
  background: #f3f3f3;
}

.btn-check {
  width: calc(100% - 36px);
  margin: 0 18px 18px;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: var(--navy);
  color: white;
  font-weight: 600;
  font-size: 15px;
  cursor: pointer;
}

#result {
  margin: 0 18px 18px;
}

.result-card {
  background: #fafafa;
  border-radius: 14px;
  padding: 16px;
}

.result-title {
  font-size: 18px;
  font-weight: 600;
}

.result-desc {
  font-size: 13px;
  color: #666;
  margin-top: 6px;
}

.safe { color: var(--safe); }
.warning { color: var(--warn); }
.danger { color: var(--danger); }

.footer {
  text-align: center;
  font-size: 11px;
  color: #aaa;
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="topbar">
  <span class="topbar-brand">Patrick Labs AI</span>
  <div class="globe-icon">🌍</div>
</div>

<div class="container">

<h1>Can I drink this water?</h1>
<div class="data-source">Based on global water safety patterns</div>

<div class="card">
  <div class="input-section">
    <input id="location" placeholder="Search city..." oninput="showSuggestions()" />
    <div id="suggestions"></div>
  </div>

  <button class="btn-check" onclick="checkWater()">Check Water 💧</button>

  <div id="result"></div>
</div>

<div class="footer">
AI-estimated data. Always verify locally.
</div>

</div>

<script>

const data = {
  "seoul": {flag:"🇰🇷", status:"SAFE", reason:"Strict regulation and purification."},
  "tokyo": {flag:"🇯🇵", status:"SAFE", reason:"Clean tap system."},
  "bangkok": {flag:"🇹🇭", status:"WARNING", reason:"Avoid tap water."},
  "bali": {flag:"🇮🇩", status:"DANGER", reason:"Bacteria contamination."},
  "delhi": {flag:"🇮🇳", status:"DANGER", reason:"Unsafe tap water."},
  "mumbai": {flag:"🇮🇳", status:"DANGER", reason:"Water quality varies."},
  "paris": {flag:"🇫🇷", status:"SAFE", reason:"Highly regulated."},
  "london": {flag:"🇬🇧", status:"SAFE", reason:"Strict standards."},
  "new york": {flag:"🇺🇸", status:"SAFE", reason:"Clean reservoir water."},
  "sydney": {flag:"🇦🇺", status:"SAFE", reason:"Safe municipal supply."},
  "cairo": {flag:"🇪🇬", status:"DANGER", reason:"Inconsistent quality."}
};

function showSuggestions(){
  const input = document.getElementById("location").value.toLowerCase();
  const box = document.getElementById("suggestions");
  box.innerHTML="";

  if(input.length < 1) return;

  Object.keys(data)
    .filter(city => city.includes(input))
    .slice(0,5)
    .forEach(city => {
      const div = document.createElement("div");
      div.className="sug-item";
      div.innerHTML = `<span>${city}</span><span>${data[city].flag}</span>`;
      div.onclick = ()=>{
        document.getElementById("location").value=city;
        box.innerHTML="";
      }
      box.appendChild(div);
    });
}

function checkWater(){
  const val = document.getElementById("location").value.toLowerCase().trim();
  const result = document.getElementById("result");

  if(!data[val]){
    result.innerHTML=`
      <div class="result-card">
        <div class="warning result-title">Checking water quality...</div>
        <div class="result-desc">Analyzing global data</div>
      </div>
    `;
    return;
  }

  const d = data[val];
  let cls="warning";
  if(d.status==="SAFE") cls="safe";
  if(d.status==="DANGER") cls="danger";

  result.innerHTML=`
    <div class="result-card">
      <div class="result-title ${cls}">
        ${d.flag} ${d.status}
      </div>
      <div class="result-desc">${d.reason}</div>
    </div>
  `;
}

</script>

</body>
</html>
