<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DrinkSafe</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  background:#f5f4f0;
  font-family:'Inter', sans-serif;
}

/* 상단 */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 20px;
  background:white;
  border-bottom:1px solid #e8e5de;
  font-size:13px;
  color:#9aa0a6;
  font-family:'Space Grotesk', sans-serif;
}

.globe{
  animation:spin 6s linear infinite;
}

@keyframes spin{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}

.container{
  max-width:460px;
  margin:auto;
  padding:20px;
}

/* 제목 */
h1{
  font-family:'Syne';
  font-size:34px;
  line-height:1.1;
  color:#0B1F3B;
}

h1 span{
  color:#9aa0a6;
}

/* 브랜드 문구 */
.tagline{
  margin-top:8px;
  font-size:13px;
  color:#7a7f87;
}

/* GIF */
.gif iframe{
  width:100%;
  height:200px;
  border:none;
  border-radius:14px;
  margin-top:12px;
}

/* 카드 */
.card{
  margin-top:18px;
  background:white;
  border-radius:20px;
  padding:16px;
  border:1px solid #e8e5de;
}

.input-wrap{
  position:relative;
}

input{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:1px solid #e5e5e5;
  background:#f7f7f7;
  font-size:15px;
  box-sizing:border-box;
}

#suggestions{
  position:absolute;
  top:50px;
  left:0;
  right:0;
  background:white;
  border-radius:12px;
  border:1px solid #e5e5e5;
  overflow:hidden;
  z-index:10;
}

.sug{
  padding:12px;
  cursor:pointer;
}

.sug:hover{
  background:#f0f0f0;
}

button{
  width:100%;
  margin-top:10px;
  padding:14px;
  border-radius:12px;
  border:none;
  background:#0B1F3B;
  color:white;
  font-size:15px;
  cursor:pointer;
}

#result{
  margin-top:14px;
  font-size:15px;
}
</style>
</head>

<body onclick="hideSuggestions(event)">

<div class="topbar">
  <div>Patrick Labs AI</div>
  <div class="globe">🌍</div>
</div>

<div class="container">

<h1>
  Can I drink<br>
  <span>this water?</span>
</h1>

<div class="tagline">
⚡️ AI-powered water safety intelligence platform<br>
Based on WHO, CDC, UNICEF & global data
</div>

<div class="gif">
<iframe src="https://giphy.com/embed/nfnF2zVPRemXu"></iframe>
</div>

<div class="card">

<div class="input-wrap">
<input id="locationInput"
 placeholder="Enter city or country"
 onfocus="showPopular()"
 oninput="showSuggestions()">
<div id="suggestions"></div>
</div>

<button onclick="checkWater()">Check water 💧</button>
<button onclick="useMyLocation()">Use my location 📍</button>

<div id="result"></div>

</div>

</div>

<script>

let isLoading=false;

const input = document.getElementById("locationInput");
const result = document.getElementById("result");
const suggestions = document.getElementById("suggestions");

const data = {
"south korea":"SAFE",
"france":"SAFE",
"india":"DANGER",
"kenya":"WARNING",
"united states":"SAFE"
};

const cityMap = {
"seoul":"south korea",
"paris":"france",
"mumbai":"india",
"delhi":"india",
"nairobi":"kenya",
"new york":"united states"
};

const popular=["Mumbai 🇮🇳","Delhi 🇮🇳","Paris 🇫🇷","Seoul 🇰🇷","Nairobi 🇰🇪"];

function showPopular(){
suggestions.innerHTML="";
popular.forEach(c=>{
let d=document.createElement("div");
d.className="sug";
d.innerText=c;
d.onclick=()=>{
input.value=c.split(" ")[0];
suggestions.innerHTML="";
};
suggestions.appendChild(d);
});
}

function showSuggestions(){
let val=input.value.toLowerCase();
suggestions.innerHTML="";
for(let key in cityMap){
if(key.includes(val)){
let d=document.createElement("div");
d.className="sug";
d.innerText=key;
d.onclick=()=>{
input.value=key;
suggestions.innerHTML="";
};
suggestions.appendChild(d);
}
}
}

function hideSuggestions(e){
if(!input.contains(e.target)){
suggestions.innerHTML="";
}
}

function normalize(v){
return v.toLowerCase().trim();
}

function render(status,isLoc=false){
isLoading=false;

let text = status==="SAFE" ? "Safe to drink" :
status==="DANGER" ? "Not safe to drink" :
"Boil or filter recommended";

let extra = isLoc ? "<div>📍 Based on nearby infrastructure (~1km)</div>" : "";

result.innerHTML=`<b>${status}</b><br>${text}${extra}`;
}

function checkWater(){
if(isLoading) return;
isLoading=true;

suggestions.innerHTML="";
result.innerHTML="💧 Checking...";

let val=normalize(input.value);
let country=cityMap[val]||val;

setTimeout(()=>{
let status=data[country] || "WARNING";
render(status);
},700);
}

function useMyLocation(){
if(isLoading) return;
isLoading=true;

result.innerHTML="📡 Getting location...";
suggestions.innerHTML="";

navigator.geolocation.getCurrentPosition(async(pos)=>{

try{
let res=await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`);
let loc=await res.json();

let city =
loc.address.city ||
loc.address.town ||
loc.address.state ||
loc.address.country;

input.value = city;

let val=normalize(city);
let country=cityMap[val]||val;

let status=data[country] || "WARNING";

render(status,true);

}catch{
isLoading=false;
result.innerHTML="❌ Location failed";
}

},()=>{
isLoading=false;
result.innerHTML="❌ Location permission denied";
});
}

</script>

</body>
</html>
