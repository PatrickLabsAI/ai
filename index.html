<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DrinkSafe</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  background:#f5f4f0;
  font-family:'Inter', sans-serif;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 20px;
  background:white;
  border-bottom:1px solid #e8e5de;
  font-size:14px;
  color:#9aa0a6;
}

.globe{
  animation:spin 6s linear infinite;
}

@keyframes spin{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}

.container{
  max-width:460px;
  margin:auto;
  padding:40px 20px;
}

h1{
  font-family:'Syne';
  font-size:44px;
  line-height:1.05;
  color:#0B1F3B;
}

h1 span{
  color:#9aa0a6;
}

.subtitle{
  margin-top:10px;
  font-size:28px;
  animation:flow 1.5s infinite alternate;
}

@keyframes flow{
  from{opacity:0.6;}
  to{opacity:1;}
}

.card{
  margin-top:30px;
  background:white;
  border-radius:20px;
  padding:16px;
  border:1px solid #e8e5de;
}

.input-wrap{
  position:relative;
}

input{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:1px solid #e5e5e5;
  background:#f7f7f7;
  font-size:15px;
  box-sizing:border-box;
}

#suggestions{
  position:absolute;
  top:50px;
  left:0;
  right:0;
  background:white;
  border-radius:12px;
  border:1px solid #e5e5e5;
  overflow:hidden;
  z-index:10;
}

.sug{
  padding:12px;
  cursor:pointer;
}

.sug:hover{
  background:#f0f0f0;
}

button{
  width:100%;
  margin-top:10px;
  padding:14px;
  border-radius:12px;
  border:none;
  background:#0B1F3B;
  color:white;
  font-size:15px;
  cursor:pointer;
}

#result{
  margin-top:14px;
  font-size:15px;
  line-height:1.5;
}
</style>
</head>

<body>

<div class="topbar">
  <div>Patrick Labs AI</div>
  <div class="globe">🌍</div>
</div>

<div class="container">

<h1>
  Can I drink<br>
  <span>this water?</span>
</h1>

<div class="subtitle">🌊💦</div>

<div class="card">

<div class="input-wrap">
<input id="location"
 placeholder="Enter city or country"
 onfocus="showPopular()"
 oninput="showSuggestions()">
<div id="suggestions"></div>
</div>

<button onclick="checkWater()">Check water 💧</button>
<button onclick="useMyLocation()">Use my location 📍</button>

<div id="result"></div>

</div>

</div>

<script>

// 데이터 + 설명 + 전화
const data = {
"south korea":{
status:"SAFE",
msg:"Tap water is safe to drink.",
desc:"Highly regulated water system.",
phone:"+822120"
},
"japan":{
status:"SAFE",
msg:"Safe tap water nationwide.",
desc:"Strict national quality standards.",
phone:"+81353281111"
},
"france":{
status:"SAFE",
msg:"Tap water is generally safe.",
desc:"EU regulated water quality.",
phone:"+33140405050"
},
"india":{
status:"DANGER",
msg:"Do not drink tap water.",
desc:"High contamination risk.",
phone:"+911123792000"
},
"thailand":{
status:"WARNING",
msg:"Avoid tap water. Use bottled.",
desc:"Not consistently treated.",
phone:"+6622039000"
},
"kenya":{
status:"WARNING",
msg:"Boil or filter water.",
desc:"Water safety varies by region.",
phone:"+254202718707"
},
"united states":{
status:"SAFE",
msg:"Generally safe to drink.",
desc:"EPA regulated system.",
phone:"+12126399675"
}
};

// 도시 매핑
const cityMap = {
"seoul":"south korea",
"paris":"france",
"tokyo":"japan",
"mumbai":"india",
"delhi":"india",
"nairobi":"kenya",
"new york":"united states"
};

// 인기 도시
const popular = [
"Mumbai 🇮🇳",
"Delhi 🇮🇳",
"Paris 🇫🇷",
"Seoul 🇰🇷",
"Nairobi 🇰🇪"
];

// 인기 표시
function showPopular(){
let box=document.getElementById("suggestions");
box.innerHTML="";

popular.forEach(c=>{
let div=document.createElement("div");
div.className="sug";
div.innerText=c;

div.onclick=()=>{
document.getElementById("location").value=c.split(" ")[0];
box.innerHTML="";
};

box.appendChild(div);
});
}

// 자동완성
function showSuggestions(){
let input=document.getElementById("location").value.toLowerCase();
let box=document.getElementById("suggestions");
box.innerHTML="";

for(let key in cityMap){
if(key.includes(input)){
let div=document.createElement("div");
div.className="sug";
div.innerText=key;

div.onclick=()=>{
document.getElementById("location").value=key;
box.innerHTML="";
};

box.appendChild(div);
}
}
}

// normalize
function normalize(input){
return input.toLowerCase().trim();
}

// 로딩
function showLoading(){
let dots=0;
const result=document.getElementById("result");

return setInterval(()=>{
dots=(dots+1)%4;
result.innerHTML=`💧 Checking water quality${'.'.repeat(dots)} ⏳`;
},500);
}

// 결과
function render(d, isLocation=false){

let color="#a05c00";
if(d.status==="SAFE") color="#1a7a4a";
if(d.status==="DANGER") color="#c0272d";

let extra = isLocation 
? "<div style='margin-top:8px;'>📍 Within ~1km radius, tap water via public system is generally assessed.</div>"
: "";

document.getElementById("result").innerHTML=
`<div style="color:${color};font-weight:600">${d.status}</div>
<div>${d.msg}</div>
<div style="color:#666;font-size:13px">${d.desc}</div>
${extra}
<div style="margin-top:8px;">
📞 <a href="tel:${d.phone}">Call local authority</a>
</div>`;
}

// 검색
function checkWater(){
let input=document.getElementById("location").value;
let normalized=normalize(input);

let loader=showLoading();

let country=cityMap[normalized]||normalized;

setTimeout(()=>{
clearInterval(loader);

if(data[country]){
render(data[country]);
}else{
document.getElementById("result").innerHTML=
"💧 Water quality is being verified... ⏳";
}

},1200);
}

// GPS
function useMyLocation(){

const result = document.getElementById("result");
result.innerHTML = "📡 Getting location...";

navigator.geolocation.getCurrentPosition(async(pos)=>{

let lat = pos.coords.latitude;
let lon = pos.coords.longitude;

try{
let res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
let loc = await res.json();

let city =
loc.address.city ||
loc.address.town ||
loc.address.state ||
loc.address.country;

document.getElementById("location").value = city.toLowerCase();

let normalized = normalize(city);
let country = cityMap[normalized] || normalized;

if(data[country]){
render(data[country], true);
}else{
document.getElementById("result").innerHTML=
"💧 Water quality is being verified... ⏳";
}

}catch(e){
result.innerHTML="💧 Checking water quality... ⏳";
}

});
}

</script>

</body>
</html>
