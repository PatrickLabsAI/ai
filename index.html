<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DrinkSafe</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=Inter:wght@300;400;500;600&family=Quicksand:wght@400;600&family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  background:#f5f4f0;
  font-family:'Inter', sans-serif;
}

.topbar{
  display:flex;
  justify-content:space-between;
  padding:14px 20px;
  background:white;
  border-bottom:1px solid #e8e5de;
  font-size:13px;
  color:#9aa0a6;
  font-family:'Space Grotesk';
}

.globe{
  animation:spin 6s linear infinite;
}

@keyframes spin{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}

.container{
  max-width:460px;
  margin:auto;
  padding:18px;
}

h1{
  font-family:'Syne';
  font-size:32px;
  margin-top:0px;
  color:#0B1F3B;
}

h1 span{
  color:#9aa0a6;
}

.tagline{
  margin-top:-6px;
  font-size:13px;
  color:#7a7f87;
}

.tagline span{
  animation:flash 1s infinite alternate;
}

@keyframes flash{
  from{opacity:0.4;}
  to{opacity:1;}
}

.gif iframe{
  width:100%;
  height:200px;
  border:none;
  border-radius:14px;
  margin-top:8px;
  pointer-events:none;
}

.card{
  margin-top:16px;
  background:white;
  border-radius:20px;
  padding:16px;
  border:1px solid #e8e5de;
}

.input-wrap{
  position:relative;
}

input{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:1px solid #e5e5e5;
  background:#f7f7f7;
  font-size:15px;
}

#suggestions{
  position:absolute;
  top:52px;
  left:0;
  right:0;
  background:white;
  border-radius:12px;
  border:1px solid #e5e5e5;
  max-height:200px;
  overflow-y:auto;
  z-index:10;
}

.sug{
  padding:12px;
  cursor:pointer;
}

.sug:hover{
  background:#f0f0f0;
}

button{
  width:100%;
  margin-top:10px;
  padding:14px;
  border-radius:12px;
  border:none;
  background:#0B1F3B;
  color:white;
}

.share{
  background:#e9ecf1;
  color:#0B1F3B;
}

#result{
  margin-top:14px;
  font-family:'Quicksand';
  font-size:16px;
}
</style>
</head>

<body onclick="hideSuggestions(event)">

<div class="topbar">
  <div>Patrick Labs AI</div>
  <div class="globe">🌍</div>
</div>

<div class="container">

<h1>
Can I drink<br>
<span>this water?</span>
</h1>

<div class="tagline">
<span>⚡️</span> AI-powered live water cloud<br>
<span>⚡️</span> Based on WHO, CDC & UNICEF
</div>

<div class="gif">
<iframe src="https://giphy.com/embed/nfnF2zVPRemXu"></iframe>
</div>

<div class="card">

<div class="input-wrap">
<input id="locationInput"
placeholder="Enter any city or country"
onfocus="showPopular()"
oninput="showSuggestions()">
<div id="suggestions"></div>
</div>

<button onclick="checkWater()">Check water 💧</button>
<button onclick="useMyLocation()">Use my location 📍</button>

<div id="result"></div>

<button class="share" onclick="shareResult()">Share 🔗</button>

</div>

</div>

<script>

const input = document.getElementById("locationInput");
const result = document.getElementById("result");
const suggestions = document.getElementById("suggestions");

let lastResult="";

/* 🌍 데이터 */
const data = {
"global":{status:"WARNING",phone:""},
"south korea":{status:"SAFE",phone:"+821339"},
"japan":{status:"SAFE",phone:"+81119"},
"china":{status:"WARNING",phone:"+8612320"},
"india":{status:"DANGER",phone:"+91104"},
"thailand":{status:"WARNING",phone:"+661423"},
"vietnam":{status:"WARNING",phone:"+84908115678"},
"indonesia":{status:"WARNING",phone:"+621500454"},
"philippines":{status:"WARNING",phone:"+632165364"},
"singapore":{status:"SAFE",phone:"+651769"},
"malaysia":{status:"SAFE",phone:"+60388810200"},

"united states":{status:"SAFE",phone:"+18004264791"},
"canada":{status:"SAFE",phone:"+18002679988"},
"mexico":{status:"WARNING",phone:"+525511055420"},

"united kingdom":{status:"SAFE",phone:"+441234567890"},
"france":{status:"SAFE",phone:"+3315"},
"germany":{status:"SAFE",phone:"+4911220"},

"south africa":{status:"WARNING",phone:"+27123000000"},
"kenya":{status:"WARNING",phone:"+254202717077"},
"egypt":{status:"WARNING",phone:"+20227956300"},
"nigeria":{status:"DANGER",phone:"+2347000000000"},
"ghana":{status:"WARNING",phone:"+233302682611"}
};

const countries = Object.keys(data);

/* 도시 */
const cityMap = {
"seoul":"south korea","tokyo":"japan","paris":"france",
"london":"united kingdom","new york":"united states",
"mumbai":"india","nairobi":"kenya","lagos":"nigeria",
"cape town":"south africa","cairo":"egypt"
};

const popular=[
"Seoul 🇰🇷","Tokyo 🇯🇵","Paris 🇫🇷","London 🇬🇧",
"New York 🇺🇸","Mumbai 🇮🇳","Nairobi 🇰🇪","Lagos 🇳🇬"
];

function getCountry(val){
val=val.toLowerCase().trim();
if(data[val]) return val;
if(cityMap[val]) return cityMap[val];
return "global";
}

function render(obj,name){
let explanation =
obj.status==="SAFE"
? "✅ Clean & safe tap water."
: obj.status==="DANGER"
? "🚫 Unsafe. Avoid drinking."
: "⚠️ Boil or filter recommended.";

lastResult=`${name}: ${obj.status}`;

result.innerHTML=`
<b>${obj.status}</b><br>
${explanation}<br><br>
${obj.phone?`📞 <a href="tel:${obj.phone}">Call authority</a>`:""}
`;
}

function selectItem(name){
input.value=name;
suggestions.innerHTML="";
render(data[getCountry(name)],name);
}

function showPopular(){
suggestions.innerHTML="";
popular.forEach(c=>{
let d=document.createElement("div");
d.className="sug";
d.innerText=c;
d.onclick=()=>selectItem(c.split(" ")[0]);
suggestions.appendChild(d);
});
}

function showSuggestions(){
let val=input.value.toLowerCase();
suggestions.innerHTML="";

if(!val){showPopular();return;}

/* 도시 */
Object.keys(cityMap).forEach(k=>{
if(k.includes(val)){
let d=document.createElement("div");
d.className="sug";
d.innerText=k;
d.onclick=()=>selectItem(k);
suggestions.appendChild(d);
}
});

/* 국가 */
countries.forEach(c=>{
if(c.includes(val)){
let d=document.createElement("div");
d.className="sug";
d.innerText=c;
d.onclick=()=>selectItem(c);
suggestions.appendChild(d);
}
});
}

function hideSuggestions(e){
if(!input.contains(e.target)){
suggestions.innerHTML="";
}
}

function checkWater(){
let val=input.value.trim();
if(!val){
result.innerHTML="❗ Enter location";
return;
}
render(data[getCountry(val)],val);
}

function useMyLocation(){
result.innerHTML="📡 Getting location...";
suggestions.innerHTML="";

navigator.geolocation.getCurrentPosition(async(pos)=>{
let res=await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`);
let loc=await res.json();

let place =
loc.address.city ||
loc.address.town ||
loc.address.state ||
loc.address.country;

input.value=place;
render(data[getCountry(place)],place);

},()=>{ result.innerHTML="❌ Permission denied"; });
}

function shareResult(){
if(!lastResult){alert("Check water first!");return;}
navigator.share
? navigator.share({title:"Water",text:lastResult,url:location.href})
: (navigator.clipboard.writeText(lastResult), alert("Copied!"));
}

</script>

</body>
</html>
