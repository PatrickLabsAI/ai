<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DrinkSafe</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  background:#f5f4f0;
  font-family:'Inter', sans-serif;
}

.topbar{
  display:flex;
  justify-content:space-between;
  padding:16px 20px;
  color:#9aa0a6;
  font-size:14px;
}

.container{
  max-width:460px;
  margin:auto;
  padding:50px 20px;
}

h1{
  font-family:'Syne';
  font-size:44px;
  line-height:1.1;
  color:#0B1F3B;
}

h1 span{
  color:#9aa0a6;
}

.subtitle{
  margin-top:18px;
  color:#9aa0a6;
  font-size:16px;
}

.card{
  margin-top:35px;
  background:white;
  border-radius:20px;
  padding:18px;
}

input{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:1px solid #e5e5e5;
  background:#f7f7f7;
  font-size:15px;
}

button{
  width:100%;
  margin-top:10px;
  padding:14px;
  border-radius:12px;
  border:none;
  background:#0B1F3B;
  color:white;
  font-size:15px;
  cursor:pointer;
}

#result{
  margin-top:14px;
  font-size:15px;
}
</style>
</head>

<body>

<div class="topbar">
  <div>Patrick Labs AI</div>
  <div>🌍</div>
</div>

<div class="container">

<h1>
  Can I drink<br>
  <span>this water?</span>
</h1>

<div class="subtitle">
  Based on WHO, CDC, UNICEF & local authorities
</div>

<div class="card">

<input id="location" placeholder="Enter city or country">

<button onclick="checkWater()">Check water 💧</button>
<button onclick="useMyLocation()">Use my location 📍</button>

<div id="result"></div>

</div>

</div>

<script>

// 국가 데이터
const data = {
"south korea":{status:"SAFE",msg:"Clean infrastructure 🇰🇷"},
"japan":{status:"SAFE",msg:"High standards 🇯🇵"},
"united states":{status:"SAFE",msg:"EPA regulated 🇺🇸"},
"thailand":{status:"WARNING",msg:"Filtered recommended 🇹🇭"},
"india":{status:"DANGER",msg:"Not safe to drink 🇮🇳"}
};

// 도시 매핑 (핵심)
const cityMap = {
"seoul":"south korea",
"서울":"south korea",
"서울특별시":"south korea",
"tokyo":"japan",
"bangkok":"thailand",
"delhi":"india",
"new york":"united states"
};

// 문자열 정리
function normalize(input){
return input
.toLowerCase()
.replace("특별시","")
.replace("시","")
.trim();
}

// 로딩 UI
function showLoading(){
let dots = 0;
const result = document.getElementById("result");

return setInterval(()=>{
dots = (dots + 1) % 4;
result.innerHTML = `💧 Checking water quality${'.'.repeat(dots)} ⏳`;
},500);
}

// 결과 렌더
function render(d){
let color="#a05c00";
if(d.status==="SAFE") color="#1a7a4a";
if(d.status==="DANGER") color="#c0272d";

document.getElementById("result").innerHTML=
`<div style="color:${color};font-weight:600">${d.status}</div>
<div>${d.msg}</div>`;
}

// 검색
function checkWater(){
let input = document.getElementById("location").value;
let normalized = normalize(input);

let loader = showLoading();

let country = cityMap[normalized] || normalized;

setTimeout(()=>{
clearInterval(loader);

if(data[country]){
render(data[country]);
}else{
document.getElementById("result").innerHTML =
"💧 Water quality is being verified... ⏳";
}

},1200);
}

// GPS (완전 수정)
function useMyLocation(){

const result = document.getElementById("result");
result.innerHTML = "📡 Getting location...";

if(!navigator.geolocation){
result.innerHTML="Location not supported";
return;
}

navigator.geolocation.getCurrentPosition(async(pos)=>{

let lat = pos.coords.latitude;
let lon = pos.coords.longitude;

try{
let res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
let loc = await res.json();

let city =
loc.address.city ||
loc.address.town ||
loc.address.state ||
loc.address.region ||
loc.address.country;

document.getElementById("location").value = city;

// 자동 실행
checkWater();

}catch(e){
result.innerHTML="💧 Checking water quality... ⏳";
}

},
()=>{
result.innerHTML="Location permission denied";
},
{
timeout:8000
});
}

</script>

</body>
</html>
