<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Can I drink this water? — Patrick Labs AI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<!-- OG 썸네일 -->
<meta property="og:title" content="Can I drink this water?" />
<meta property="og:description" content="Check water safety worldwide instantly." />
<meta property="og:image" content="https://images.unsplash.com/photo-1502741338009-cac2772e18bc" />
<meta property="og:url" content="https://ai-zeta-lake.vercel.app/" />
<meta name="twitter:card" content="summary_large_image" />

<style>
body {
  font-family: 'Inter', sans-serif;
  background: #f7f7f7;
  margin: 0;
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 30px 20px;
}

h1 {
  font-size: 26px;
  margin-bottom: 10px;
}

.sub {
  color: #777;
  font-size: 13px;
  margin-bottom: 20px;
}

.card {
  background: white;
  border-radius: 16px;
  padding: 20px;
}

input {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  border: 1px solid #ddd;
  margin-bottom: 10px;
}

#suggestions div {
  padding: 10px;
  cursor: pointer;
}

#suggestions div:hover {
  background: #eee;
}

button {
  width: 100%;
  padding: 14px;
  background: black;
  color: white;
  border: none;
  border-radius: 10px;
  margin-top: 10px;
}

.result {
  margin-top: 20px;
}

.safe { color: green; }
.warning { color: orange; }
.danger { color: red; }
</style>
</head>

<body>

<div class="container">

<h1>Can I drink this water?</h1>
<div class="sub">Based on WHO, CDC, UNICEF data</div>

<div class="card">

<input id="location" placeholder="Enter city (e.g. Tokyo)" oninput="suggest()" />
<div id="suggestions"></div>

<button onclick="check()">Check Water</button>

<div id="result" class="result"></div>

</div>

</div>

<script>

const data = {
  "seoul": {status:"SAFE", reason:"Advanced water purification system and strict regulation."},
  "tokyo": {status:"SAFE", reason:"One of the cleanest tap water systems globally."},
  "bangkok": {status:"WARNING", reason:"Tap water may contain bacteria. Bottled water recommended."},
  "bali": {status:"DANGER", reason:"High risk of bacterial contamination."},
  "delhi": {status:"DANGER", reason:"Severe contamination risk from infrastructure."},
  "paris": {status:"SAFE", reason:"Highly regulated and safe municipal supply."},
  "london": {status:"SAFE", reason:"Strict quality standards."},
  "new york": {status:"SAFE", reason:"High-quality reservoir water."},
  "mexico city": {status:"DANGER", reason:"Unsafe tap water, contamination risk."},
  "cairo": {status:"DANGER", reason:"Water quality varies significantly."}
};

// 자동완성
function suggest(){
  const val = document.getElementById("location").value.toLowerCase();
  const box = document.getElementById("suggestions");
  box.innerHTML="";

  if(val.length < 1) return;

  Object.keys(data)
    .filter(city => city.includes(val))
    .slice(0,5)
    .forEach(city => {
      const div = document.createElement("div");
      div.innerText = city;
      div.onclick = () => {
        document.getElementById("location").value = city;
        box.innerHTML="";
      };
      box.appendChild(div);
    });
}

// 결과
function check(){
  const val = document.getElementById("location").value.toLowerCase().trim();
  const result = document.getElementById("result");

  if(!data[val]){
    result.innerHTML = `
      <div class="warning"><b>No data</b></div>
      <div>Try major cities like Tokyo, Paris, Bali</div>
    `;
    return;
  }

  const d = data[val];

  let cls = "warning";
  if(d.status==="SAFE") cls="safe";
  if(d.status==="DANGER") cls="danger";

  result.innerHTML = `
    <div class="${cls}"><b>${d.status}</b></div>
    <div>${d.reason}</div>
  `;
}

</script>

</body>
</html>
